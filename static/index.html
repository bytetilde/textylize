<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textylize</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <textarea id="text" placeholder="type something..."></textarea>
    <button id="settings-btn">&#9881;</button>
    <button id="stylize">stylize</button>
    <div id="backdrop"></div>
    <div id="modal">
      <div id="modal-header">
        <span>stylize</span>
        <button id="close-modal">&times;</button>
      </div>
      <div id="strip"></div>
      <div id="result-wrap">
        <textarea id="result" readonly rows="1"></textarea>
        <button id="copy-btn" style="display:none">copy</button>
      </div>
    </div>
    <div id="submodal">
      <div id="submodal-header">
        <span id="submodal-label">create style</span>
        <button id="close-submodal">&times;</button>
      </div>
      <div id="emoji-outer">
        <div id="emoji-preview" class="emoji-large">&#x1F4DC;</div>
        <div id="emoji-grid"></div>
      </div>
      <input id="new-title" placeholder="title" maxlength="32">
      <textarea id="new-body" placeholder="style instructions..." rows="5"></textarea>
      <div class="row">
        <button id="cancel-style">cancel</button>
        <button id="save-style">save</button>
      </div>
    </div>
    <div id="settings-modal">
      <div id="backdrop2" style="position:fixed;inset:0;background:var(--overlay);z-index:-1;"></div>
      <div id="settings-panel">
        <button id="settings-close">&times;</button>
        <h2>settings</h2>
        <div class="srow">
          <label>dark mode</label>
          <div class="toggle-wrap" id="dark-toggle-wrap">
            <div class="toggle" id="dark-toggle"></div>
          </div>
        </div>
        <div class="srow" id="auth-row">
          <label>account</label>
          <div class="toggle-wrap" id="auth-btn">
            <div class="toggle" id="auth-toggle">connect</div>
          </div>
        </div>
        <div class="srow">
          <label>model</label>
          <select id="model-select"></select>
        </div>
        <div class="srow">
          <label>temperature</label>
          <input type="range" id="temp-range" min="0" max="2" step="0.1" value="1.0">
          <span class="val" id="temp-val">1.0</span>
        </div>
        <div class="srow">
          <label>max tokens</label>
          <input type="number" id="maxtks-input" min="64" max="8192" step="64" value="1024">
        </div>
      </div>
    </div>
    <div id="toast"></div>
    <script src="app.js"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </body>
</html>
