<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textylize</title>
    <link rel="stylesheet" href="style.css">
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </head>
  <body>
    <textarea id="text" placeholder="type something..."></textarea>
    <button id="settings-btn">&#9881;</button>
    <button id="stylize">stylize</button>
    <div id="backdrop"></div>
    <div id="modal">
      <div id="modal-header">
        <span>stylize</span>
      </div>
      <div id="strip"></div>
      <div id="result-wrap">
        <textarea id="result" readonly rows="7"></textarea>
        <div id="result-actions" style="display:none">
          <button class="stop-btn" id="stop-btn">stop</button>
          <button id="apply-btn">apply</button>
          <button id="copy-btn">copy</button>
        </div>
      </div>
    </div>
    <div id="submodal">
      <div id="submodal-panel">
        <h2 id="submodal-label">create style</h2>
        <div id="emoji-outer">
          <div id="emoji-preview" class="emoji-large">&#x1F4DC;</div>
          <div id="emoji-grid"></div>
          <input id="new-title" placeholder="title" maxlength="24">
        </div>
        <textarea id="new-body" placeholder="style instructions..." rows="8"></textarea>
        <div class="row">
          <button id="cancel-style">cancel</button>
          <button id="save-style">save</button>
        </div>
      </div>
    </div>
    <div id="settings-modal">
      <div id="backdrop2"></div>
      <div id="settings-panel">
        <h2>settings</h2>
        <div class="srow">
          <label>dark mode</label>
          <label class="toggle-wrap" id="dark-toggle-wrap">
            <input type="checkbox" id="dark-toggle">
            <div class="toggle-track"><div class="toggle-knob"></div></div>
          </label>
        </div>
        <div class="srow" id="auth-row">
          <label>account</label>
          <div id="auth-btn">
            <div class="toggle" id="auth-toggle">connect</div>
          </div>
        </div>
        <div class="srow">
          <label>model</label>
          <div class="select-wrap">
            <select id="model-select"></select>
          </div>
        </div>
        <div class="srow">
          <label>temperature</label>
          <input type="range" id="temp-range" min="0" max="2" step="0.1" value="1.0">
          <span class="val" id="temp-val">1.0</span>
        </div>
        <div class="srow">
          <label>max tokens</label>
          <input type="number" id="maxtks-input" min="64" max="8192" step="64" value="1024" style="-moz-appearance:textfield">
        </div>
      </div>
    </div>
    <div id="toast"></div>
    <script src="app.js"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </body>
</html>
